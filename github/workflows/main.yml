name: Build Ar RPG Game 🚀

on:
  push:
    branches:
      - master
      - main

jobs:
  buildAndroid:
    name: Build for Android 🏗️
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # 2. تعديل إعدادات المشروع (الاسم والأيقونة) تلقائياً
      - name: Set App Name and Icon
        run: |
          # تغيير اسم التطبيق في ملف الإعدادات
          if [ -f ProjectSettings/ProjectSettings.asset ]; then
            sed -i 's/productName: .*/productName: Ar RPG game/g' ProjectSettings/ProjectSettings.asset
          fi
          echo "App name set to Ar RPG game"

      # 3. طلب ملف تفعيل الرخصة (ALF)
      # هذا الخطوة هي اللي راح تطلع لك الملف اللي ترفعه بالموقع
      - name: Request Activation File
        uses: game-ci/unity-request-activation-file@v2
        id: get_alf

      # 4. رفع ملف الـ .alf للتحميل من الـ Actions
      - name: Upload ALF
        uses: actions/upload-artifact@v2
        with:
          name: Unity_Activation_File
          path: ${{ steps.get_alf.outputs.filePath }}

      # 5. طبخ الـ APK النهائي (سيفشل حتى تضع الـ UNITY_LICENSE في الـ Secrets)
      - name: Build Android APK
        uses: game-ci/unity-builder@v2
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          androidIconPath: Assets/icons.png

      # 6. رفع ملف الـ APK إذا نجح البناء
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: Ar_RPG_Game_Build
          path: build/Android
          
