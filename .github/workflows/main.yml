name: Build Ar RPG Game 🚀

on: [push]

jobs:
  activation:
    name: Get Unity License 🔑
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Request Activation File
        uses: game-ci/unity-request-activation-file@v2.1.0 # التحديث الجديد هنا
        id: get_alf

      - name: Upload ALF
        uses: actions/upload-artifact@v4
        with:
          name: Unity_Activation_File
          path: ${{ steps.get_alf.outputs.filePath }}

  buildAndroid:
    needs: activation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set App Name
        run: |
          if [ -f ProjectSettings/ProjectSettings.asset ]; then
            sed -i 's/productName: .*/productName: Ar RPG game/g' ProjectSettings/ProjectSettings.asset
          fi

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          androidIconPath: Assets/icons.png

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ar_RPG_Game_Build
          path: build/Android
          
